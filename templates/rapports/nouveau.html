{% extends "base.html" %}

{% block content %}

<section class="card">

    <div class="section-header">
        <div>
            <h2>Nouveau rapport d'intervention</h2>
            <p>Renseigner les travaux réalisés.</p>
        </div>
    </div>

    <form method="POST" enctype="multipart/form-data" class="form">

        <label for="date_rapport">Date du rapport</label>

        <input
            type="date"
            id="date_rapport"
            name="date_rapport"
            value="{{ date_du_jour }}"
            required
        >

        <label>Secteur</label>
        <select name="secteur_id" required>
            <option value="">-- Choisir un secteur --</option>
            {% for secteur in secteurs %}
                <option value="{{ secteur.id }}">
                    {{ secteur.nom }}
                </option>
            {% endfor %}
        </select>

        <label>Machine</label>
        <input type="text" name="machine" required>

        <label>Problème</label>
        <textarea name="probleme" rows="4" required></textarea>

        <label>Travaux réalisés</label>
        <textarea name="travaux" rows="4" required></textarea>

        <div class="autocomplete-field">
            <label for="technicien">Nom du technicien</label>

            <input
                type="text"
                id="technicien"
                name="technicien"
                placeholder="Rechercher ou saisir un technicien"
                autocomplete="off"
                required
            >

            <div
                id="technicienSuggestions"
                class="autocomplete-suggestions"
            >
                {% for technicien in techniciens %}
                    <button
                        type="button"
                        class="autocomplete-option"
                        data-value="{{ technicien }}"
                    >
                        {{ technicien }}
                    </button>
                {% endfor %}
            </div>
        </div>

        <label>Commentaire</label>
        <textarea name="commentaire" rows="4"></textarea>

        <label>Référence</label>
        <input type="text" name="reference">

        <label>Photo</label>

        <label class="upload-box">

            <input
                type="file"
                name="photo"
                accept="image/*"
                onchange="updateFileName(this)"
            >

            <div class="upload-content">

                <div class="upload-icon">
                    📷
                </div>

                <img
                    id="preview-image"
                    class="preview-image"
                    style="display:none;"
                >

                <strong>
                    Ajouter une photo
                </strong>

                <p id="file-name">
                    Cliquez pour sélectionner une image
                </p>

            </div>

        </label>

        <button class="btn" type="submit">
            Enregistrer le rapport
        </button>

    </form>

</section>

<script>

function updateFileName(input){

    const preview = document.getElementById("preview-image");
    const text = document.getElementById("file-name");

    if(input.files.length){

        preview.src = URL.createObjectURL(input.files[0]);
        preview.style.display = "block";

        text.innerHTML = "✅ " + input.files[0].name;

    }

}

</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const input = document.getElementById("technicien");
    const suggestions = document.getElementById("technicienSuggestions");
    const options = suggestions.querySelectorAll(".autocomplete-option");

    function filtrerTechniciens() {
        const recherche = input.value.trim().toLowerCase();
        let resultatVisible = false;

        options.forEach(function (option) {
            const nom = option.dataset.value.toLowerCase();
            const visible = !recherche || nom.includes(recherche);

            option.style.display = visible ? "block" : "none";

            if (visible) {
                resultatVisible = true;
            }
        });

        suggestions.classList.toggle(
            "is-visible",
            resultatVisible
        );
    }

    input.addEventListener("focus", filtrerTechniciens);
    input.addEventListener("input", filtrerTechniciens);

    options.forEach(function (option) {
        option.addEventListener("click", function () {
            input.value = option.dataset.value;
            suggestions.classList.remove("is-visible");
        });
    });

    document.addEventListener("click", function (event) {
        if (
            !input.contains(event.target)
            && !suggestions.contains(event.target)
        ) {
            suggestions.classList.remove("is-visible");
        }
    });
});
</script>

{% endblock %}
