<div
    id="confirmModal"
    class="confirm-modal"
    aria-hidden="true"
>
    <div
        class="confirm-modal-backdrop"
        data-confirm-close
    ></div>

    <div
        class="confirm-modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="confirmModalTitle"
    >
        <button
            type="button"
            class="confirm-modal-close"
            data-confirm-close
            aria-label="Fermer"
        >
            &times;
        </button>

        <div class="confirm-modal-icon">
            🗑️
        </div>

        <h2 id="confirmModalTitle">
            Confirmer la suppression
        </h2>

        <p>
            Êtes-vous sûr de vouloir supprimer :
        </p>

        <strong id="confirmModalName">
            Cet élément
        </strong>

        <p class="confirm-modal-warning">
            Cette action est irréversible.
        </p>

        <form
            id="confirmModalForm"
            method="POST"
        >
            <div class="confirm-modal-actions">
                <button
                    type="button"
                    class="btn-secondary"
                    data-confirm-close
                >
                    Annuler
                </button>

                <button
                    type="submit"
                    class="btn-danger"
                >
                    🗑️ Supprimer
                </button>
            </div>
        </form>
    </div>
</div>
